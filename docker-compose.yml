version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./logs/nginx:/var/log/nginx

    restart: unless-stopped

    networks:
      - platform-net

  api:
    build:
      context: ./platform
      dockerfile: Dockerfile

    container_name: CONTAINER_NAME

    ports:
      - "8000:8000"

    volumes:
      - .:/workspace

    working_dir: /workspace

    command: >
      uvicorn platform.api:app
      --host 0.0.0.0
      --port 8000

    depends_on:
      - nginx

    restart: unless-stopped

    networks:
      - platform-net

networks:
  platform-net:
    name: platform-net
