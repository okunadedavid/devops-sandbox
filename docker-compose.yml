version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./logs/nginx:/var/log/nginx

    restart: unless-stopped

    networks:
      - devops-sandbox

  api:
    build:
      context: ./platform
      dockerfile: Dockerfile

    container_name: platform-api

    ports:
      - "8000:5000"

    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

    working_dir: /workspace

    command: >
      python platform/api.py

    depends_on:
      - nginx

    restart: unless-stopped

    networks:
      - devops-sandbox

networks:
  devops-sandbox:
    name: devops-sandbox
    external: true
